server:
  port: ${PORT:8080}

spring:
  application:
    name: mackron-ai

mackron:
  playwright:
    headless: true
    browser: chromium
    timeout: 30000
    screenshot-dir: ${java.io.tmpdir}/mackron-ai/screenshots

  llm:
    default-provider: openai
    openai-url: https://api.openai.com/v1/chat/completions
    claude-url: https://api.anthropic.com/v1/messages

management:
  endpoints:
    web:
      exposure:
        include: health,info
